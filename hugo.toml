url = "https://linkedin.com/in/caio-lucasmoraes"
weight = 1
[menu.social.params]
icon = "linkedinv2"
newTab = true

[[menu.social]]
identifier = "github"
name = "GitHub"
url = "https://github.com/caio-lucas07"
weight = 2
[menu.social.params]
icon = "github"
newTab = true




[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "Posts"
url = "/posts/"
weight = 2

[[menu.main]]
name = "Projects"
url = "/projects/"
weight = 3

[[menu.main]]
name = "About"
url = "/about/"
