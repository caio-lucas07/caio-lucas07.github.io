[params]
mainSections = ["posts"]
math = true
favicon = "/favicon.ico"
[params.widgets]
enabled = ["toc"]
  [[params.widgets.page]]
  type = "toc"

[taxonomies]
tag = "tags"
category = "categories"

[markup]   
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.renderHooks]
      [markup.goldmark.renderHooks.image]
        useEmbedded = "always"
      [markup.goldmark.renderHooks.link]
        useEmbedded = "always"
  [markup.goldmark.extensions]
    [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)']]
  [markup.highlight]
    lineNos = true
    codeFences = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false  